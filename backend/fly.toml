# fly.toml app configuration file for Fly.io deployment

app = "fyc-backend"
primary_region = "sin"

[deploy]
  release_command = "python seeds/import_donors.py"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DATABASE_URL = "sqlite:////app/data/fyc_connect.db"
  ENVIRONMENT = "production"
  # Real CORS origins (no "*"). Browser frontends that call the backend.
  # Add custom domains (e.g. https://fycconnect.org) here once their certs are live.
  ALLOWED_ORIGINS = "https://fyc-web.fly.dev,https://fyc-admin.fly.dev"
  # NOTE: OTP_BYPASS_CODE intentionally removed — real OTP via Twilio Verify.
  # Secrets (SECRET_KEY, FIRST_SUPERADMIN_PASSWORD, BOOTSTRAP_ADMIN_*) are set
  # via `flyctl secrets set`, never in this file.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Fail broken deploys instead of going green: Fly waits for this HTTP check
  # to pass before marking a machine healthy during a release.
  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

[mounts]
  source = "fyc_data"
  destination = "/app/data"

[[statics]]
  guest_path = "/app/uploads"
  url_prefix = "/uploads"
