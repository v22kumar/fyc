app = "fyc-backend"
primary_region = "sin"  # Singapore — closest to India

[build]

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "fyc_data"
  destination = "/app/data"

[[statics]]
  guest_path = "/app/uploads"
  url_prefix = "/uploads"
