# fly.toml app configuration file for Fly.io deployment

app = "fyc-backend"
primary_region = "sin"

[deploy]
  release_command = "python seeds/import_donors.py"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DATABASE_URL = "sqlite:////app/data/fyc_connect.db"
  OTP_BYPASS_CODE = "123456"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Deploy gate: Fly marks a machine healthy only after this check passes, so a
  # release that boots but can't serve DB-backed requests FAILS instead of going
  # green. Points at the deep readiness probe (real DB query), not the shallow
  # /api/health — schema drift kept /api/health at 200 during the last outage.
  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/api/health/ready"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

[mounts]
  source = "fyc_data"
  destination = "/app/data"

[[statics]]
  guest_path = "/app/uploads"
  url_prefix = "/uploads"
