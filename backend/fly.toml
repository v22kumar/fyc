# fly.toml app configuration file for Fly.io deployment

app = "fyc-backend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DATABASE_URL = "sqlite:////app/data/fyc_connect.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

[mounts]
  source = "fyc_data"
  destination = "/app/data"

[[statics]]
  guest_path = "/app/uploads"
  url_prefix = "/uploads"
