# fly.toml app configuration file for Fly.io deployment

app = "fyc-backend"
primary_region = "sin"



[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DATABASE_URL = "sqlite:////app/data/fyc_connect.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Deploy gate: Fly marks a machine healthy only after this check passes, so a
  # release that boots but can't serve DB-backed requests FAILS instead of going
  # green. Points at the deep readiness probe (real DB query), not the shallow
  # /api/health — schema drift kept /api/health at 200 during the last outage.
  [[http_service.checks]]
    # Generous grace: startup runs create_all + a full schema-reconcile across all
    # tables + idempotent seeding before the app serves, which can take well over
    # 30s on a cold machine. Too-short a grace makes the deploy fail its health
    # check even though the app comes up fine moments later.
    grace_period = "120s"
    interval = "15s"
    method = "GET"
    timeout = "8s"
    path = "/api/health/ready"

[[vm]]
  size = "shared-cpu-1x"
  # 1 GB headroom for live events: ~25 in-memory python-chess boards + WAL page
  # cache + keepalive/scheduler. For a big event also bump CPU for the day:
  #   flyctl scale vm shared-cpu-2x --app fyc-backend   (scale back after)
  memory = "1024mb"
  cpus = 1

[mounts]
  source = "fyc_data"
  destination = "/app/data"

[[statics]]
  guest_path = "/app/uploads"
  url_prefix = "/uploads"
