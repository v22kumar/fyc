# FYC Connect — Production Nginx Reverse Proxy
#
# SSL Setup (run once after deploying):
#   sudo certbot --nginx -d fyc.org -d www.fyc.org -d admin.fyc.org -d api.fyc.org
#
# After certbot runs it will modify this file to add SSL blocks.

# ── API (FastAPI) ─────────────────────────────────────────────────────────────
upstream fyc_api {
    server api:8000;
    keepalive 16;
}

# ── Admin (Next.js) ───────────────────────────────────────────────────────────
upstream fyc_admin {
    server admin:3000;
    keepalive 8;
}

# ── Public Web (Astro static) ─────────────────────────────────────────────────
upstream fyc_web {
    server web:80;
    keepalive 8;
}

# Redirect HTTP → HTTPS (certbot will manage this)
server {
    listen 80;
    server_name fyc.org www.fyc.org admin.fyc.org api.fyc.org;
    return 301 https://$host$request_uri;
}

# ── api.fyc.org ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.fyc.org;

    # SSL certs managed by certbot
    # ssl_certificate / ssl_certificate_key added by certbot

    client_max_body_size 20M;

    location / {
        proxy_pass http://fyc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Static uploads
    location /uploads/ {
        proxy_pass http://fyc_api;
        proxy_set_header Host $host;
        expires 7d;
    }
}

# ── admin.fyc.org ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.fyc.org;

    location / {
        proxy_pass http://fyc_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}

# ── fyc.org / www.fyc.org ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name fyc.org www.fyc.org;

    location / {
        proxy_pass http://fyc_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Static assets are cached at the web container level
        proxy_cache_valid 200 1d;
    }
}
