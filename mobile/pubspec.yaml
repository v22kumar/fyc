name: fyc_connect
description: FYC Connect — Multi-tenant community service mobile app for Friends Youth Club Nagercoil

publish_to: 'none'
version: 1.0.0+1   # versionName=1.0.0, versionCode=1 (increment versionCode on each Play Store update)

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Networking
  dio: ^5.5.0

  # Dependency injection
  get_it: ^7.7.0

  # Navigation
  go_router: ^14.2.0

  # Local storage
  shared_preferences: ^2.3.0

  # Deep links (WhatsApp wa.me) + APK download for the in-app updater
  url_launcher: ^6.3.0

  # App version info (in-app update check)
  package_info_plus: ^8.0.0

  # In-app APK download (to private cache) + one-tap install for the updater
  path_provider: ^2.1.4
  open_filex: ^4.5.0

  # Functional error handling
  dartz: ^0.10.1

  # QR display
  qr_flutter: ^4.1.0

  # Camera / image picking
  image_picker: ^1.1.2

  # QR scanner (event check-in)
  mobile_scanner: ^5.2.3

  # Date formatting
  intl: ^0.20.2

  # GPS location (weather by current position)
  geolocator: ^13.0.2

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Firebase — push notifications (FCM)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  # Foreground tray notifications (FCM auto-shows tray only when backgrounded)
  flutter_local_notifications: ^17.2.3

  # Icons
  cupertino_icons: ^1.0.8

  google_fonts: ^6.2.0

  # Chess
  squares: ^1.2.1       # board widget, drag/drop, piece images, animations
  bishop: ^1.4.4        # chess rules, move validation, FEN/PGN
  square_bishop: ^0.3.0 # bridge between squares and bishop
  stockfish_chess_engine: ^0.8.2  # native Stockfish AI via platform channel
  web_socket_channel: ^3.0.1      # WebSocket client for real-time online games
  share_plus: ^10.0.0             # share PGN / game links

  # Performance — image caching & network awareness
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.4
  battery_plus: ^6.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/illustrations/
    - assets/translations/
