name: Deploy Infrastructure Stack

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'admin/**'
      - 'web/**'
      - 'docker-compose.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/fyc-backend:latest

    - name: Build and Push Admin Image
      uses: docker/build-push-action@v5
      with:
        context: ./admin
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/fyc-admin:latest

    - name: Build and Push Web Image
      uses: docker/build-push-action@v5
      with:
        context: ./web
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/fyc-web:latest

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /opt/fyc-connect
          # Pull latest code for docker-compose and nginx config
          git pull origin main
          
          # Pull latest images
          docker-compose pull
          
          # Apply latest database migrations
          docker-compose run --rm backend alembic upgrade head
          
          # Restart services
          docker-compose up -d --remove-orphans
          
          # Clean up old images
          docker system prune -f
