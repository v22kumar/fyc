name: Web Deploy (Flutter → GitHub Pages)

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/web-deploy.yml'
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deployment; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # >= 3.29 so flutter_localizations allows intl ^0.20.2 (pubspec).
          flutter-version: 3.32.0
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        # base-href must match the GitHub Pages project path (/<repo>/).
        # API_BASE_URL points the app at the deployed Fly.io backend.
        run: |
          flutter build web --release \
            --base-href "/fyc/" \
            --dart-define=API_BASE_URL=https://fyc-backend.fly.dev

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile/build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
