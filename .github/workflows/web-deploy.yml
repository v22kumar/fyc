name: Web Deploy (Astro → Fly.io)

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/web-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Web Frontend to Fly.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Web
        run: |
          # Create the app + provision on first run if it doesn't exist yet.
          if ! flyctl status --config web/fly.toml > /dev/null 2>&1; then
            echo "App does not exist on Fly.io. Creating it..."
            APP_NAME=$(grep -E "^app\s*=" web/fly.toml | cut -d'"' -f2)
            flyctl apps create "$APP_NAME" --org personal || true
          fi
          cd web
          flyctl deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
