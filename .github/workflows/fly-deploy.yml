name: Fly Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/fly-deploy.yml'

jobs:
  deploy:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy App
        run: |
          # Try to deploy, if the app doesn't exist, create it and provision the volume first
          if ! flyctl status --config backend/fly.toml > /dev/null 2>&1; then
            echo "App does not exist on Fly.io. Attempting to create app and volume..."
            # Note: If the app name is already taken globally, edit backend/fly.toml to change 'app'
            APP_NAME=$(grep -E "^app\s*=" backend/fly.toml | cut -d'"' -f2)
            flyctl apps create "$APP_NAME" --org personal || true
            flyctl volumes create fyc_data --region sin --size 1 --yes --config backend/fly.toml || true
          fi
          flyctl deploy --config backend/fly.toml --working-dir backend --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
