name: Flutter Build & Release APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/flutter-build.yml'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write   # required to create / update GitHub Releases

jobs:
  build:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Flutter SDK ───────────────────────────────────────────────────────
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── 3. Release signing ───────────────────────────────────────────────────
      # Skipped automatically if KEYSTORE_BASE64 secret is not configured.
      # Add these in GitHub → Settings → Secrets → Actions:
      #   KEYSTORE_BASE64   — base64 of fyc-release.jks
      #                       generate: keytool -genkey ... then: base64 -w0 fyc-release.jks
      #   KEY_STORE_PASSWORD — keystore password
      #   KEY_PASSWORD       — key password
      - name: Setup release signing
        working-directory: mobile/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::notice::KEYSTORE_BASE64 not set — build will use debug signing"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > fyc-release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=fyc\nstoreFile=../fyc-release.jks\n' \
            "$KEY_STORE_PASSWORD" "$KEY_PASSWORD" > key.properties
          echo "Release signing configured ✓"

      # ── 3b. Print release key SHA-1 (needed for Firebase/Google Sign-In) ───────
      - name: Print release key SHA-1 fingerprint
        working-directory: mobile/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::notice::No keystore — skipping SHA-1 print"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/check-release.jks
          echo "=== Release Key SHA-1 (add to Firebase Console for Google Sign-In) ==="
          keytool -list -v -keystore /tmp/check-release.jks -alias fyc \
            -storepass "$KEY_STORE_PASSWORD" 2>/dev/null \
            | grep -E "SHA1:|SHA256:" | head -4
          echo "======================================================================="
          rm -f /tmp/check-release.jks

      # ── 4. Dependencies ───────────────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      # ── 5. Build ──────────────────────────────────────────────────────────────
      # API_BASE_URL baked in at compile time so the APK hits production.
      # GOOGLE_SERVER_CLIENT_ID = Web OAuth client ID from Firebase Console
      #   → needed so GoogleSignIn returns a valid idToken for backend verification.
      #   Add as GitHub Secret: GOOGLE_SERVER_CLIENT_ID
      - name: Build release APKs (split per ABI — arm64, arm32, x86_64)
        working-directory: mobile
        env:
          GOOGLE_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_SERVER_CLIENT_ID }}
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=API_BASE_URL=https://fyc-backend.fly.dev \
            --dart-define=DEFAULT_ORG_ID=8f8b80b7-4b71-4770-b183-5c5f49e49a1d \
            --dart-define=GOOGLE_SERVER_CLIENT_ID=${GOOGLE_SERVER_CLIENT_ID:-} \
            --dart-define=DEV_AUTH_BYPASS=true

      - name: Build release AAB  (Google Play Store)
        working-directory: mobile
        env:
          GOOGLE_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_SERVER_CLIENT_ID }}
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=https://fyc-backend.fly.dev \
            --dart-define=DEFAULT_ORG_ID=8f8b80b7-4b71-4770-b183-5c5f49e49a1d \
            --dart-define=GOOGLE_SERVER_CLIENT_ID=${GOOGLE_SERVER_CLIENT_ID:-}

      # ── 6. Rename outputs with stable filenames ───────────────────────────────
      - name: Rename outputs
        run: |
          # Split APKs — one per architecture
          cp mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             mobile/build/app/outputs/flutter-apk/fyc-connect-arm64.apk
          cp mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             mobile/build/app/outputs/flutter-apk/fyc-connect-arm32.apk
          cp mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk \
             mobile/build/app/outputs/flutter-apk/fyc-connect-x86_64.apk
          # AAB
          cp mobile/build/app/outputs/bundle/release/app-release.aab \
             mobile/build/app/outputs/bundle/release/fyc-connect-latest.aab

      # ── 7. Artifacts (kept 30 days — useful for debugging) ───────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fyc-connect-apks-${{ github.sha }}
          path: |
            mobile/build/app/outputs/flutter-apk/fyc-connect-arm64.apk
            mobile/build/app/outputs/flutter-apk/fyc-connect-arm32.apk
            mobile/build/app/outputs/flutter-apk/fyc-connect-x86_64.apk
          retention-days: 30

      - name: Upload AAB artifact (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: fyc-connect-aab-${{ github.sha }}
          path: mobile/build/app/outputs/bundle/release/fyc-connect-latest.aab
          retention-days: 30

      # ── 8. Delete stale fat APK from release (if present from old builds) ───────
      - name: Remove old fat APK from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET_ID=$(gh api repos/${{ github.repository }}/releases/tags/app-latest \
            --jq '.assets[] | select(.name=="fyc-connect-latest.apk") | .id' 2>/dev/null || echo "")
          if [ -n "$ASSET_ID" ]; then
            gh api --method DELETE repos/${{ github.repository }}/releases/assets/$ASSET_ID
            echo "Deleted stale fyc-connect-latest.apk from release ✓"
          else
            echo "No stale fat APK found — nothing to clean up"
          fi

      # ── 9. Publish APKs + AAB to rolling GitHub Release ─────────────────────
      # Creates or updates the "app-latest" release on every successful build.
      # Pick the APK that matches your phone:
      #   fyc-connect-arm64.apk  — most modern Android phones (2017+)  ← USE THIS
      #   fyc-connect-arm32.apk  — older/budget 32-bit Android phones
      #   fyc-connect-x86_64.apk — Android emulators
      - name: Publish to GitHub Release (app-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-latest
          name: "FYC Connect — Latest Android Build"
          body: |
            🤖 **Auto-built from `main`**

            | Field | Value |
            |---|---|
            | Commit | `${{ github.sha }}` |
            | Built at | ${{ github.run_started_at }} |
            | Workflow | [Run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ## ⬇️ Download for your device

            | File | Size | Device |
            |---|---|---|
            | **`fyc-connect-arm64.apk`** | ~40 MB | ✅ **Pixel 6a / most phones (2017+)** — download this |
            | `fyc-connect-arm32.apk` | ~36 MB | Older / budget 32-bit phones |
            | `fyc-connect-x86_64.apk` | ~43 MB | Android emulator only |

            > **First install?** Uninstall any previous FYC Connect, then install the arm64 APK.

            **Play Store upload:** use `fyc-connect-latest.aab` below.
          prerelease: true
          make_latest: false
          files: |
            mobile/build/app/outputs/flutter-apk/fyc-connect-arm64.apk
            mobile/build/app/outputs/flutter-apk/fyc-connect-arm32.apk
            mobile/build/app/outputs/flutter-apk/fyc-connect-x86_64.apk
            mobile/build/app/outputs/bundle/release/fyc-connect-latest.aab

      # ── 9. Wire up backend download URL (idempotent) ─────────────────────────
      # Sets APP_APK_URL on fyc-backend so the web "Download App" button works.
      # Skipped automatically if FLY_API_TOKEN secret is not configured.
      # The GitHub Release URL is stable, so this only triggers a backend
      # redeploy the very first time (when APP_APK_URL is not yet set).
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set APP_APK_URL on backend (first build only)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::notice::FLY_API_TOKEN not set — skipping backend URL update"
            exit 0
          fi

          APK_URL="https://github.com/${{ github.repository }}/releases/download/app-latest/fyc-connect-latest.apk"

          # Only set if not already configured (avoids unnecessary backend redeploy)
          CURRENT=$(flyctl secrets list --app fyc-backend --json 2>/dev/null \
            | python3 -c "import sys,json; s=json.load(sys.stdin); print(next((x['Name'] for x in s if x['Name']=='APP_APK_URL'),''))" 2>/dev/null || echo "")

          if [ -z "$CURRENT" ]; then
            echo "Setting APP_APK_URL on fyc-backend..."
            flyctl secrets set APP_APK_URL="$APK_URL" --app fyc-backend
            echo "APP_APK_URL set ✓  — backend redeploying with download link active"
          else
            echo "APP_APK_URL already configured — no backend redeploy needed ✓"
          fi
