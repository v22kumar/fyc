name: CI Tests

# Sprint 1 CI hardening: before this workflow, nothing gated a merge to main —
# flutter-build.yml and fly-deploy.yml both trigger only on push to main
# (i.e. AFTER code is already merged), so a broken PR had no automated check
# to catch it before landing. This workflow runs on every PR and every branch
# push (not on main itself — main is already covered by the build/deploy
# workflows) so backend pytest and Flutter widget tests actually gate merges.
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend — pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        # `python -m pytest` (not bare `pytest`) so the backend/ working
        # directory is prepended to sys.path — otherwise `import app...`
        # fails with "No module named 'app'" since there's no installed
        # package/pyproject pythonpath config making `app` importable.
        run: python -m pytest -v

  mobile-tests:
    name: Mobile — flutter analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        working-directory: mobile
        # Errors always fail this step (as they should — this is the check
        # that just caught a real pre-existing bug: cached_image.dart
        # referenced an undefined ShimmerSkeleton, fixed in this same PR).
        # --no-fatal-warnings/-infos scope day-one strictness to errors only:
        # dart analyze fails on warnings by default, and this codebase has a
        # multi-sprint backlog of pre-existing lint warnings (unused imports,
        # deprecated withOpacity, etc.) across files this sprint never
        # touched. Retroactively failing every future PR on that backlog
        # would make the new gate useless noise, not stricter. Tighten this
        # once the warning backlog is paid down (tracked as a follow-up, not
        # silently dropped — see docs/SPRINT_1_STATUS.md).
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        working-directory: mobile
        run: flutter test
