version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fyc_connect
      POSTGRES_USER: fyc
      POSTGRES_PASSWORD: fycpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fyc -d fyc_connect"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fyc:fycpassword@db:5432/fyc_connect
      SECRET_KEY: ${SECRET_KEY:-changeme_in_production_32chars_min}
      OTP_BYPASS_CODE: ${OTP_BYPASS_CODE:-}
      FIRST_SUPERADMIN_PHONE: ${FIRST_SUPERADMIN_PHONE:-+919876543210}
      FIRST_SUPERADMIN_PASSWORD: ${FIRST_SUPERADMIN_PASSWORD:-changeme_admin_password}
    ports:
      - "8000:8000"

volumes:
  postgres_data:
